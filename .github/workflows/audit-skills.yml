# Run snyk-agent-scan against the public skills on every PR + main push.
#
# Auth: prefers the Snyk GitHub Cloud App (no token needed if installed at the
# org/repo level). Falls back to a SNYK_TOKEN repo secret if present. If neither
# is configured the scan step will print Snyk's "set SNYK_TOKEN" message and
# exit non-zero — the workflow continues so the artifact (if any) still uploads.
#
# To wire the GitHub App: install https://github.com/apps/snyk-security on this
# repo via Snyk's UI. To wire the token instead: Settings → Secrets → Actions →
# new secret named SNYK_TOKEN (value from app.snyk.io/account).

name: audit-skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'skill-scripts/**'
      - '.github/workflows/audit-skills.yml'
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'skill-scripts/**'
      - '.github/workflows/audit-skills.yml'
  workflow_dispatch:

jobs:
  agent-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (for uvx snyk-agent-scan)
        uses: astral-sh/setup-uv@v3

      - name: Run snyk-agent-scan on public skills
        id: scan
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e
          uvx snyk-agent-scan@latest --skills ./skills --json > audit.json
          rc=$?
          echo "snyk-agent-scan exit: $rc"
          echo "--- audit.json ---"
          cat audit.json 2>/dev/null || echo "(no output)"
          exit $rc

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-agent-scan-report
          path: audit.json
          if-no-files-found: ignore

      - name: Fail on High / Critical findings
        if: steps.scan.outcome == 'success'
        # Findings live at .skills.issues[]; severity is on .extra_data.severity
        # and is lowercase ("high" / "critical"). The W007 finding on
        # code-reviewer is documented + mitigated by secret-shield, so we
        # acknowledge (ignore) it here and gate on the rest.
        run: |
          NEW_HIGH=$(jq '[.skills.issues[]
            | select(.extra_data.severity == "high" or .extra_data.severity == "critical")
            | select(.code != "W007")] | length' audit.json)
          echo "Unacknowledged high/critical findings: $NEW_HIGH"
          if [ "$NEW_HIGH" -gt 0 ]; then
            echo "::error::Unacknowledged high/critical findings present"
            jq '.skills.issues[]
              | select(.extra_data.severity == "high" or .extra_data.severity == "critical")
              | select(.code != "W007")
              | { code, severity: .extra_data.severity, message }' audit.json
            exit 1
          fi
